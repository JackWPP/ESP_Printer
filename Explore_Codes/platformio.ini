[platformio]
default_envs = esp32s3

; ESP32-S3-N16R8 : 16MB QIO flash + 8MB OPI(八线)PSRAM,WiFi + BLE 5.0
[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- N16R8 关键配置 ---
board_build.arduino.memory_type = qio_opi      ; QIO flash + OPI(八线)PSRAM
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    ; --- S3 串口说明(重要)---
    ; 多数 N16R8 裸板只有一个原生 USB 口 -> 保留下面这行,Serial 走 USB-CDC。
    ; 若你的板子有独立 UART/COM 口(如官方 DevKitC-1 的 "UART" 口)且插那个口 -> 删掉下面这行。
    ; 现象:烧录成功但串口监视器无输出,基本就是这行该删/该留搞反了。
    -DARDUINO_USB_CDC_ON_BOOT=1

; PC 上跑 TimerCore 单元测试,不需要硬件:  pio test -e native
[env:native]
platform = native
build_flags = -std=gnu++17
